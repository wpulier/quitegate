name: Release macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build, notarize, and publish DMG
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_SIGNING_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${CERTIFICATE_BASE64:-}" || -z "${CERTIFICATE_PASSWORD:-}" || -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "Missing Developer ID signing secrets." >&2
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/quietgate-signing.keychain-db"

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning

      - name: Build notarized installer
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          QUIETGATE_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_ID:-}" || -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" || -z "${QUIETGATE_APPLE_TEAM_ID:-}" ]]; then
            echo "Missing Apple notarization secrets." >&2
            exit 1
          fi

          script/package_public_release.sh --notarize

      - name: Find notarized DMG
        id: dmg
        run: |
          set -euo pipefail
          DMG_PATH="$(find dist -maxdepth 1 -type f -name 'QuietGate-*-notarize.dmg' -print | sort | tail -n 1)"
          if [[ -z "$DMG_PATH" ]]; then
            echo "No notarized DMG produced." >&2
            exit 1
          fi
          STABLE_DMG_PATH="dist/QuietGate.dmg"
          cp "$DMG_PATH" "$STABLE_DMG_PATH"
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "filename=$(basename "$DMG_PATH")" >> "$GITHUB_OUTPUT"
          echo "stable_path=$STABLE_DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "stable_filename=QuietGate.dmg" >> "$GITHUB_OUTPUT"
          VERSIONED_SHA="$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')"
          printf '%s  %s\n' "$VERSIONED_SHA" "$(basename "$DMG_PATH")" | tee "$DMG_PATH.sha256"
          printf '%s  QuietGate.dmg\n' "$VERSIONED_SHA" | tee "$STABLE_DMG_PATH.sha256"

      - name: Validate public installer
        run: |
          set -euo pipefail
          script/verify_installer_dmg.sh --public "${{ steps.dmg.outputs.path }}"
          script/verify_installer_dmg.sh --public "${{ steps.dmg.outputs.stable_path }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dmg.outputs.filename }}
          path: |
            ${{ steps.dmg.outputs.path }}
            ${{ steps.dmg.outputs.path }}.sha256
            ${{ steps.dmg.outputs.stable_path }}
            ${{ steps.dmg.outputs.stable_path }}.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          DMG_PATH="${{ steps.dmg.outputs.path }}"
          STABLE_DMG_PATH="${{ steps.dmg.outputs.stable_path }}"
          SHA_PATH="$DMG_PATH.sha256"
          STABLE_SHA_PATH="$STABLE_DMG_PATH.sha256"
          SHA256="$(awk '{print $1}' "$SHA_PATH")"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists: $TAG" >&2
            exit 1
          fi

          cat > "$RUNNER_TEMP/release-notes.md" <<NOTES
          QuietGate ${TAG}

          Install:
          1. Download the DMG.
          2. Open it.
          3. Drag QuietGate to Applications.
          4. Open QuietGate and follow Setup.

          SHA-256:
          ${SHA256}

          Stable latest download:
          https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/QuietGate.dmg

          Versioned download:
          https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${{ steps.dmg.outputs.filename }}
          NOTES

          gh release create "$TAG" "$DMG_PATH" "$SHA_PATH" "$STABLE_DMG_PATH" "$STABLE_SHA_PATH" \
            --title "QuietGate ${TAG}" \
            --notes-file "$RUNNER_TEMP/release-notes.md"

          REPO="${GITHUB_REPOSITORY}"
          FILENAME="$(basename "$DMG_PATH")"
          echo "Download URL: https://github.com/$REPO/releases/download/$TAG/$FILENAME"
          echo "Stable latest download: https://github.com/$REPO/releases/latest/download/QuietGate.dmg"
